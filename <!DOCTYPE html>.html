<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Phone Lock Screen</title>
                <style>
                        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; font-family: sans-serif; color: white; }
                                .lock-container { text-align: center; background: rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 20px; backdrop-filter: blur(10px); }
                                        #display { font-size: 2rem; margin-bottom: 20px; letter-spacing: 10px; height: 40px; }
                                                .keypad { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; }
                                                        button { padding: 20px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.2); color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
                                                                button:active { background: rgba(255, 255, 255, 0.4); }
                                                                    </style>
                                                                    </head>
                                                                    <body>

                                                                    <div class="lock-container">
                                                                        <div id="display">----</div>
                                                                            <div class="keypad" id="keypad">
                                                                                    <!-- Buttons generated by JavaScript -->
                                                                                        </div>
                                                                                        </div>

                                                                                        <script>
                                                                                            const correctPin = "1234";
                                                                                                let input = "";
                                                                                                    const display = document.getElementById('display');
                                                                                                        const keypad = document.getElementById('keypad');

                                                                                                            // Create buttons 1-9, 0
                                                                                                                for(let i = 1; i <= 9; i++) createBtn(i);
                                                                                                                    createBtn(0);

                                                                                                                        function createBtn(num) {
                                                                                                                                    const btn = document.createElement('button');
                                                                                                                                            btn.innerText = num;
                                                                                                                                                    btn.onclick = () => {
                                                                                                                                                                    if(input.length < 4) {
                                                                                                                                                                                        input += num;
                                                                                                                                                                                                        display.innerText = "*".repeat(input.length) + "-".repeat(4 - input.length);
                                                                                                                                                                    }
                                                                                                                                                                                if(input.length === 4) {
                                                                                                                                                                                                    setTimeout(() => {
                                                                                                                                                                                                                            alert(input === correctPin ? "Unlocked!" : "Wrong PIN");
                                                                                                                                                                                                                                                input = "";
                                                                                                                                                                                                                                                                    display.innerText = "----";
                                                                                                                                                                                                    }, 200);
                                                                                                                                                                                }
                                                                                                                                                    };
                                                                                                                                                            keypad.appendChild(btn);
                                                                                                                        }
                                                                                                                        </script>
                                                                                                                        </body>
                                                                                                                        </html>
                                                                                                                                                                                                    })
                                                                                                                                                                                }
                                                                                                                                                                    }
                                                                                                                                                    }
